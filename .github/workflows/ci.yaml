name: Jerney GitOps Pipeline

on:
  workflow_dispatch:
    inputs:
      pipeline_action:
        description: 'Choose what the pipeline should do:'
        required: true
        default: 'apply_all'
        type: choice
        options:
          - apply_all     # Terraform Apply + Docker Build + Outputs
          - app_only      # Skip Terraform -> Just Docker Build + Outputs
          - destroy       # Terraform Destroy ONLY

# CRITICAL for OIDC: We must grant GitHub permission to request the Azure token
permissions:
  id-token: write
  contents: write

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  infrastructure:
    name: Provision Infrastructure (Terraform)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Terraform
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Only log into Azure and init Terraform if we aren't skipping it
      - name: Azure Login (OIDC)
        if: inputs.pipeline_action != 'app_only'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        if: inputs.pipeline_action != 'app_only'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        if: inputs.pipeline_action != 'app_only'
        run: terraform init

      - name: Terraform Apply
        if: inputs.pipeline_action == 'apply_all'
        run: terraform apply -auto-approve

      # This step ONLY runs if you select 'destroy' from the dropdown
      - name: Terraform Destroy
        if: inputs.pipeline_action == 'destroy'
        run: terraform destroy -auto-approve

  build_and_push:
    name: Build & Push Docker Images
    # Skip this entire job if we are destroying the infrastructure
    if: inputs.pipeline_action != 'destroy'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Jerney/backend
          push: true
          tags: potdartapan/jerney-backend:${{ env.IMAGE_TAG }},potdartapan/jerney-backend:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Jerney/frontend
          push: true
          tags: potdartapan/jerney-frontend:${{ env.IMAGE_TAG }},potdartapan/jerney-frontend:latest

  gitops_sync_and_output:
    name: GitOps Sync & Cluster Outputs
    needs: [infrastructure, build_and_push]
    # Skip this entire job if we are destroying the infrastructure
    if: inputs.pipeline_action != 'destroy'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Update Helm values.yaml
        env:
          NEW_TAG: ${{ env.IMAGE_TAG }}
        run: |
          yq -i '.backend.tag = env(NEW_TAG) | .frontend.tag = env(NEW_TAG)' argo/charts/jerney-app/values.yaml
          
      - name: Commit and Push Changes to Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add argo/charts/jerney-app/values.yaml
          git commit -m "chore: update image tags to ${{ env.IMAGE_TAG }} [skip ci]" || echo "No changes to commit"
          git push

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Connect to AKS Cluster
        run: az aks get-credentials --resource-group jerney-rg --name jerney-aks --admin
      - name: Bootstrap Argo CD Root Application
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: root-application
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: https://github.com/potdartapan/jerney-devsecops.git
              targetRevision: HEAD
              path: argo/charts/jerney-app
            destination:
              server: https://kubernetes.default.svc
              namespace: default
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
          EOF

      - name: Print Endpoints & Credentials
        run: |
          echo "========================================="
          echo "🚀 DEPLOYMENT SUCCESSFUL!"
          echo "========================================="
          echo "Waiting a few seconds for Argo CD to initialize..."
          sleep 10
          
          ARGOCD_PASS=$(kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d)
          
          
          echo "Argo CD Username: admin"
          echo "Argo CD Password: $ARGOCD_PASS"
          echo "Argo CD Access: Run 'kubectl port-forward svc/argocd-server -n argocd 8081:443'"
          echo "========================================="
          
          echo "Fetching NGINX Ingress Public IP..."
          # Added || true so GitHub Actions doesn't crash if the service isn't ready yet
          # Increased loop to 12 (3 minutes total) to give Azure time to provision the IP
            for i in {1..12}; do
              PUBLIC_IP=$(kubectl get svc ingress-nginx-controller -n ingress-basic -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
              if [ -n "$PUBLIC_IP" ]; then
                echo "Application Endpoint: http://$PUBLIC_IP"
                break
              fi
              echo "Waiting for LoadBalancer IP (can take 2-3 minutes in Azure)..."
              sleep 15
            done
          echo "========================================="