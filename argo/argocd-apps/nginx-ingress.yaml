# argocd-apps/nginx-ingress.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    targetRevision: 4.10.1 # It is a DevOps best practice to pin your infrastructure chart versions
    chart: ingress-nginx
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-basic
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # Argo CD will automatically create the ingress-basic namespace